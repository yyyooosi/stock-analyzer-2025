name: BSI Daily Batch

on:
  schedule:
    - cron: '0 2 * * *' # 毎日 02:00 UTC (日本時間 11:00)
  workflow_dispatch: # 手動実行も可能

jobs:
  calculate-bsi:
    runs-on: ubuntu-latest
    steps:
      - name: BSI スコアを計算
        run: |
          curl -f -X POST "${{ secrets.VERCEL_APP_URL }}/api/bsi/calculate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30
