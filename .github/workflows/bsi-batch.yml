name: BSI Daily Batch

on:
  schedule:
    - cron: '0 2 * * *' # 毎日 02:00 UTC (日本時間 11:00)
  workflow_dispatch: # 手動実行も可能

jobs:
  calculate-bsi:
    runs-on: ubuntu-latest
    steps:
      - name: BSI スコアを計算
        run: |
          # -L でリダイレクト(308など)を追従し /api/bsi/calculate 本体まで到達させる。
          # これが無いと VERCEL_APP_URL の正規化リダイレクトで「Redirecting...」を受け取って
          # 成功扱いになり、データが保存されない。307/308 は curl がデフォルトで POST を維持し、
          # 301/302/303 は --post30x で POST を維持する(--post308 というフラグは存在しない)。
          # --fail-with-body で 4xx/5xx を失敗にしつつ、レスポンス本文をログに残す。
          curl --fail-with-body -L --post301 --post302 --post303 \
            -X POST "${{ secrets.VERCEL_APP_URL }}/api/bsi/calculate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60
